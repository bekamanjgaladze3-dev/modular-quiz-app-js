<!DOCTYPE html>
<head>
<title>Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="App">
  <div class="entryOFquiz show">
    <h1>Choose any level !</h1>
    <h2 id="message"></h2>
  <div class="wrapper">
       <div class="quiz-levels">
      <div class="Easy">Easy</div>
       <div class="Medium">Medium</div>
        <div class="Hard">Hard</div>
    </div>
    <div class="button">
      <button id="start">Start The Quiz</button>
    
    </div>
  </div>
      <p class="recordsBtn">Records Of Players</p>
  </div>




  <div class="leaderBoard">
    <button id="closeBoard">Escape</button>
    <div class="boardLevels">
      <div>easy</div>
       <div>medium</div>
        <div>hard</div>
    </div>
    <div class="content">
      
    </div>
  </div>

  <div class="resultPage">
    <h1 class="resultTxt"></h1>
    <div class="input">
      <input type="text" name="" placeholder="Enter Your Name Here" />
    </div>
    <div class="btns">
      <div class="restart">
        <button>Try Again !</button>
      </div>
      <div class="addToLeaders">
        <button>Save Records</button>
      </div>
    </div>
  </div>

   <div class="loading">
    <h1>Loading...</h1>
   
   </div>
</div>


<script type="module" src="main.js"></script>
</body>
</html>
